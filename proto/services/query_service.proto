syntax = "proto3";

package raptorgate.services;

import "config/config_models.proto";

service FirewallQueryService {
  rpc GetTcpSessions  (GetTcpSessionsRequest) returns (GetTcpSessionsResponse);

  rpc SwapPolicies  (SwapPoliciesRequest) returns (SwapPoliciesResponse);
  rpc GetPolicies   (GetPoliciesRequest)       returns (GetPoliciesResponse);
  rpc GetPolicy     (GetPolicyRequest)         returns (GetPolicyResponse);
  rpc GetNatBindings(GetNatBindingsRequest)    returns (GetNatBindingsResponse);

  rpc SwapZones     (SwapZonesRequest)         returns (SwapZonesResponse);
  rpc GetZones      (GetZonesRequest)          returns (GetZonesResponse);
  rpc GetZone       (GetZoneRequest)           returns (GetZoneResponse);
  rpc SwapZonePairs (SwapZonePairsRequest)     returns (SwapZonePairsResponse);
  rpc GetZonePairs  (GetZonePairsRequest)      returns (GetZonePairsResponse);
  rpc GetZonePair   (GetZonePairRequest)       returns (GetZonePairResponse);
}

message GetTcpSessionsRequest {}
message GetTcpSessionsResponse {}

message SwapPoliciesRequest {
  repeated config.Rule rules = 1;
}

message GetPoliciesRequest {}
message GetPoliciesResponse {
  repeated config.Rule rules = 1;
}

message GetPolicyRequest {
  string id = 1;
}

message GetPolicyResponse {
  config.Rule rule = 1;
}

message SwapPoliciesResponse {
  // optional string error = 1;
}

message GetNatBindingsRequest {}
message GetNatBindingsResponse {}

message SwapZonesRequest {
  repeated config.Zone zones = 1;
}

message SwapZonesResponse {}

message GetZonesRequest {}

message GetZonesResponse {
  repeated config.Zone zones = 1;
}

message GetZoneRequest {
  string id = 1;
}

message GetZoneResponse {
  config.Zone zone = 1;
}

// Zone Pairs

message SwapZonePairsRequest {
  repeated config.ZonePair zone_pairs = 1;
}

message SwapZonePairsResponse {}

message GetZonePairsRequest {}

message GetZonePairsResponse {
  repeated config.ZonePair zone_pairs = 1;
}

message GetZonePairRequest {
  string id = 1;
}

message GetZonePairResponse {
  config.ZonePair zone_pair = 1;
}
