syntax = "proto3";

package raptorgate.events;

import "google/protobuf/timestamp.proto";

message Event {
  google.protobuf.Timestamp emitted_at = 1;
  EventKind kind = 2;
}

message EventKind {
  oneof item {
    TcpSessionEstablishedEvent     tcp_session_established  = 1;
    TcpSessionRemovedEvent         tcp_session_removed      = 2;
    TcpConnectionRejectedEvent     tcp_connection_rejected  = 3;
    TcpSessionAbortedMidCloseEvent tcp_session_aborted      = 4;
    TlsInterceptStartedEvent      tls_intercept_started     = 5;
    TlsHandshakeCompleteEvent      tls_handshake_complete    = 6;
    TlsSessionClosedEvent         tls_session_closed        = 7;
    InboundTlsInterceptStartedEvent   inbound_tls_intercept_started   = 8;
    InboundTlsHandshakeCompleteEvent  inbound_tls_handshake_complete  = 9;
    InboundTlsSessionClosedEvent      inbound_tls_session_closed      = 10;
  }
}

message TcpEndpoint {
  string ip   = 1;
  uint32 port = 2;
}

message TcpSessionEstablishedEvent {
  TcpEndpoint src = 1;
  TcpEndpoint dst = 2;
}

message TcpSessionRemovedEvent {
  TcpEndpoint src = 1;
  TcpEndpoint dst = 2;
}

message TcpConnectionRejectedEvent {
  TcpEndpoint src = 1;
  TcpEndpoint dst = 2;
}

message TcpSessionAbortedMidCloseEvent {
  TcpEndpoint src = 1;
  TcpEndpoint dst = 2;
}

message TlsInterceptStartedEvent {
  string peer_ip   = 1;
  uint32 peer_port = 2;
  string dst_ip    = 3;
  uint32 dst_port  = 4;
  string sni       = 5;
}

message TlsHandshakeCompleteEvent {
  string peer_ip   = 1;
  uint32 peer_port = 2;
  string dst_ip    = 3;
  uint32 dst_port  = 4;
  string sni       = 5;
  string alpn      = 6;
}

message TlsSessionClosedEvent {
  string peer_ip   = 1;
  uint32 peer_port = 2;
  string dst_ip    = 3;
  uint32 dst_port  = 4;
  string sni       = 5;
  uint64 bytes_up  = 6;
  uint64 bytes_down = 7;
}

message InboundTlsInterceptStartedEvent {
  string peer_ip       = 1;
  uint32 peer_port     = 2;
  string server_ip     = 3;
  uint32 server_port   = 4;
  string sni           = 5;
  string common_name   = 6;
}

message InboundTlsHandshakeCompleteEvent {
  string peer_ip       = 1;
  uint32 peer_port     = 2;
  string server_ip     = 3;
  uint32 server_port   = 4;
  string sni           = 5;
  string alpn          = 6;
}

message InboundTlsSessionClosedEvent {
  string peer_ip       = 1;
  uint32 peer_port     = 2;
  string server_ip     = 3;
  uint32 server_port   = 4;
  string sni           = 5;
  uint64 bytes_up      = 6;
  uint64 bytes_down    = 7;
}
