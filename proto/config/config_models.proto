syntax = "proto3";

package raptorgate.config;

import "common/common.proto";
import "google/protobuf/timestamp.proto";

// ─────────────────────────────────────────────────────────────────────────────
// Modele sekcji konfiguracji
//
// Każda sekcja posiada własny numer wersji (uint64). Backend inkrementuje
// wersję sekcji przy każdej zmianie jej zawartości. Firewall przechowuje
// znane wersje w lokalnym snapshotcie Redb i wysyła je w GetConfigRequest
// (pole known_versions) aby pobrać tylko zmienione sekcje (delta).
// ─────────────────────────────────────────────────────────────────────────────

// ── Reguły RaptorLang ────────────────────────────────────────────────────────

message Rule {
  string id           = 1;
  string name         = 2;
  string zone_pair_id = 3;
  uint32 priority     = 4;
  string content      = 5;  // źródło reguły w języku RaptorLang
}

message RuleSet {
  uint64         version  = 1;
  string         checksum = 2;  // SHA-256 zawartości sekcji
  repeated Rule  items    = 3;
}

// ── Strefy sieciowe ──────────────────────────────────────────────────────────

message Zone {
  string id   = 1;
  string name = 2;
  repeated string interface_ids = 3;
}

message ZoneSet {
  uint64        version = 1;
  repeated Zone items   = 2;
}

message ZoneInterface {
  string          id             = 1;
  string          zone_id        = 2;
  string          interface_name = 3;
  optional uint32 vlan_id        = 4;
}

message ZoneInterfaceSet {
  uint64                  version = 1;
  repeated ZoneInterface  items   = 2;
}

message ZonePair {
  string                   id             = 1;
  string                   src_zone_id    = 2;
  string                   dst_zone_id    = 3;
  common.DefaultPolicy     default_policy = 4;
}

message ZonePairSet {
  uint64             version = 1;
  repeated ZonePair  items   = 2;
}

// ── NAT ──────────────────────────────────────────────────────────────────────

message NatRule {
  string              id               = 1;
  common.NatRuleType  type             = 2;
  string              src_ip           = 3;
  string              dst_ip           = 4;
  optional uint32     src_port         = 5;
  optional uint32     dst_port         = 6;
  string              translated_ip    = 7;
  optional uint32     translated_port  = 8;
  uint32              priority         = 9;
}

message NatRuleSet {
  uint64             version = 1;
  repeated NatRule   items   = 2;
}

// ── DNS blacklista ────────────────────────────────────────────────────────────

message DnsBlacklistEntry {
  string id     = 1;
  string domain = 2;
}

message DnsBlacklistSet {
  uint64                      version = 1;
  repeated DnsBlacklistEntry  items   = 2;
}

// ── SSL/TLS bypass lista ─────────────────────────────────────────────────────

message SslBypassEntry {
  string id     = 1;
  string domain = 2;
}

message SslBypassSet {
  uint64                   version = 1;
  repeated SslBypassEntry  items   = 2;
}

// ── Sygnatury IPS ────────────────────────────────────────────────────────────

message IpsSignature {
  string           id       = 1;
  string           name     = 2;
  string           category = 3;
  string           pattern  = 4;
  common.Severity  severity = 5;
}

message IpsSignatureSet {
  uint64                  version = 1;
  repeated IpsSignature   items   = 2;
}

// ── Model ML (ONNX) ──────────────────────────────────────────────────────────

message MlModel {
  uint64 version       = 1;
  string id            = 2;
  string name          = 3;
  string artifact_path = 4;
  string checksum      = 5;  // SHA-256 pliku modelu
}

// ── Certyfikaty TLS ──────────────────────────────────────────────────────────

message FirewallCertificate {
  string                   id              = 1;
  common.CertificateType   cert_type       = 2;
  string                   common_name     = 3;
  string                   fingerprint     = 4;
  string                   certificate_pem = 5;
  string                   private_key_ref = 6;
  google.protobuf.Timestamp expires_at     = 7;
}

message FirewallCertificateSet {
  uint64                       version = 1;
  repeated FirewallCertificate items   = 2;
}

// ── Tożsamość użytkowników ───────────────────────────────────────────────────

message UserGroup {
  string                id     = 1;
  string                name   = 2;
  common.IdentitySource source = 3;
}

message IdentityUser {
  string                id           = 1;
  string                username     = 2;
  string                display_name = 3;
  common.IdentitySource source       = 4;
  string                external_id  = 5;
}

message UserGroupMember {
  string id               = 1;
  string group_id         = 2;
  string identity_user_id = 3;
}

// Aktywna sesja użytkownika uwierzytelnionego przez RADIUS.
message IdentityManagerUserSession {
  string                    id                = 1;
  string                    identity_user_id  = 2;
  string                    radius_username   = 3;
  string                    mac_address       = 4;
  string                    ip_address        = 5;
  string                    nas_ip            = 6;
  string                    called_station_id = 7;
  google.protobuf.Timestamp authenticated_at  = 8;
  google.protobuf.Timestamp expires_at        = 9;
}

message IdentityBundle {
  uint64                              version       = 1;
  repeated UserGroup                  user_groups   = 2;
  repeated IdentityUser               identity_users = 3;
  repeated UserGroupMember            user_group_members = 4;
  repeated IdentityManagerUserSession user_sessions = 5;
}

// ── DNS Inspection ───────────────────────────────────────────────────────────

enum DnsInspectionDnssecTransport {
  DNS_INSPECTION_DNSSEC_TRANSPORT_UNSPECIFIED = 0;
  DNS_INSPECTION_DNSSEC_TRANSPORT_UDP = 1;
  DNS_INSPECTION_DNSSEC_TRANSPORT_TCP = 2;
  DNS_INSPECTION_DNSSEC_TRANSPORT_UDP_WITH_TCP_FALLBACK = 3;
}

enum DnsInspectionDnssecFailureAction {
  DNS_INSPECTION_DNSSEC_FAILURE_ACTION_UNSPECIFIED = 0;
  DNS_INSPECTION_DNSSEC_FAILURE_ACTION_ALLOW = 1;
  DNS_INSPECTION_DNSSEC_FAILURE_ACTION_ALERT = 2;
  DNS_INSPECTION_DNSSEC_FAILURE_ACTION_BLOCK = 3;
}

message DnsInspectionGeneralConfig {
  bool enabled = 1;
}

message DnsInspectionBlocklistConfig {
  bool            enabled = 1;
  repeated string domains = 2;
}

message DnsInspectionDnsTunnelingConfig {
  bool            enabled                = 1;
  uint32          max_label_length       = 2;
  float           entropy_threshold      = 3;
  uint32          window_seconds         = 4;
  uint32          max_queries_per_domain = 5;
  uint32          max_unique_subdomains  = 6;
  repeated string ignore_domains        = 7;  // domeny ignorowane przez detektor (obsługa wildcard)
  float           alert_threshold       = 8;  // score >= próg → Alert  (domyślnie 0.6)
  float           block_threshold       = 9;  // score >= próg → Block  (domyślnie 0.85)
}

message DnsInspectionDnssecResolverEndpoint {
  string address = 1;
  uint32 port    = 2;
}

message DnsInspectionDnssecResolverConfig {
  DnsInspectionDnssecResolverEndpoint primary    = 1;
  DnsInspectionDnssecResolverEndpoint secondary  = 2;
  DnsInspectionDnssecTransport        transport  = 3;
  uint32                              timeout_ms = 4;
  uint32                              retries    = 5;
}

message DnsInspectionDnssecCacheTtlConfig {
  uint32 secure   = 1;
  uint32 insecure = 2;
  uint32 bogus    = 3;
  uint32 failure  = 4;
}

message DnsInspectionDnssecCacheConfig {
  bool                            enabled      = 1;
  uint32                          max_entries  = 2;
  DnsInspectionDnssecCacheTtlConfig ttl_seconds = 3;
}

message DnsInspectionDnssecConfig {
  bool                              enabled                     = 1;
  uint32                            max_lookups_per_packet      = 2;
  DnsInspectionDnssecFailureAction  default_on_resolver_failure = 3;
  DnsInspectionDnssecResolverConfig resolver                    = 4;
  DnsInspectionDnssecCacheConfig    cache                       = 5;
}

message DnsInspectionConfig {
  DnsInspectionGeneralConfig      general       = 1;
  DnsInspectionBlocklistConfig    blocklist     = 2;
  DnsInspectionDnsTunnelingConfig dns_tunneling = 3;
  DnsInspectionDnssecConfig       dnssec        = 4;
}

// ── AppConfig — runtime-swappable firewall configuration ─────────────────────

message AppConfig {
  repeated string capture_interfaces = 1;
  int32           pcap_timeout_ms    = 2;
  string          tun_device_name    = 3;
  string          tun_address        = 4;
  string          tun_netmask        = 5;
  string          data_dir           = 6;
  string          grpc_socket_path   = 7;
  string          query_socket_path  = 8;
  string          pki_dir            = 9;
}
