<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy Engine — Zone Management</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #0c0c0c;
      --bg-card:    #161616;
      --bg-hover:   #1c1c1c;
      --border:     #262626;
      --primary:    #06b6d4;
      --danger:     #f43f5e;
      --success:    #10b981;
      --warning:    #f59e0b;
      --txt:        #f5f5f5;
      --txt-sec:    #8a8a8a;
      --txt-muted:  #4a4a4a;
    }

    body {
      background: var(--bg-deep);
      color: var(--txt);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      padding: 32px 24px 64px;
    }

    /* ── Header ── */
    .page-header { text-align: center; margin-bottom: 32px; }
    .page-header .brand {
      font-size: 10px;
      letter-spacing: 0.35em;
      color: var(--txt-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .page-header .divider {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 8px;
    }
    .page-header .divider-line {
      height: 1px; width: 80px;
      background: linear-gradient(to right, transparent, var(--primary));
    }
    .page-header .divider-line.right {
      background: linear-gradient(to left, transparent, var(--primary));
    }
    .page-header .title {
      font-size: 13px;
      letter-spacing: 0.3em;
      color: var(--primary);
      text-transform: uppercase;
    }
    .page-header .subtitle {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--txt-sec);
      text-transform: uppercase;
      margin-top: 6px;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex; align-items: center; gap: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 10px 20px;
      margin-bottom: 24px;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .status-item { display: flex; align-items: center; gap: 8px; color: var(--txt-sec); }
    .status-item .val { color: var(--txt); }
    .status-item.module { margin-right: auto; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--success); }
      50%       { opacity: 0.5; box-shadow: 0 0 2px var(--success); }
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .toolbar-title {
      font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--txt-sec);
    }
    .btn-new {
      background: transparent;
      border: 1px solid var(--primary);
      color: var(--primary);
      font-family: inherit;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 7px 16px;
      cursor: pointer;
      transition: background 150ms, color 150ms;
    }
    .btn-new:hover { background: var(--primary); color: #000; }

    /* ── Table ── */
    .table-wrap {
      border: 1px solid var(--border);
      overflow: hidden;
    }
    table {
      width: 100%; border-collapse: collapse;
      font-size: 11px;
    }
    thead tr {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }
    thead th {
      padding: 10px 16px;
      text-align: left;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--txt-muted);
      font-weight: normal;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 120ms;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-hover); }
    tbody tr.confirm-delete { background: rgba(244, 63, 94, 0.06); }
    tbody tr.row-enter { animation: rowIn 200ms ease-out; }
    tbody tr.row-exit  { animation: rowOut 200ms ease-out forwards; }
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes rowOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(6px); }
    }
    td { padding: 12px 16px; vertical-align: middle; }

    /* Status dot in table */
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; cursor: pointer;
      transition: transform 120ms, box-shadow 120ms;
    }
    .status-dot:hover { transform: scale(1.4); }
    .status-dot.active   { background: var(--success); box-shadow: 0 0 5px var(--success); }
    .status-dot.inactive { background: var(--txt-muted); }

    .zone-name { color: var(--txt); font-weight: bold; font-size: 12px; }
    .zone-desc { color: var(--txt-sec); font-size: 10px; max-width: 260px;
                 white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mono-id   { font-family: 'Courier New', monospace; font-size: 10px; color: var(--txt-muted); }
    .created   { font-size: 10px; color: var(--txt-muted); white-space: nowrap; }

    /* Actions */
    .actions { display: flex; gap: 8px; align-items: center; }
    .btn-icon {
      background: transparent; border: none; cursor: pointer;
      padding: 4px 6px; font-size: 11px; font-family: inherit;
      letter-spacing: 0.1em; text-transform: uppercase;
      transition: color 120ms;
    }
    .btn-icon.edit   { color: var(--txt-muted); border: 1px solid transparent; }
    .btn-icon.edit:hover { color: var(--primary); border-color: var(--primary); }
    .btn-icon.delete { color: var(--txt-muted); border: 1px solid transparent; }
    .btn-icon.delete:hover { color: var(--danger); border-color: var(--danger); }

    .confirm-actions { display: flex; gap: 6px; align-items: center; }
    .confirm-label { font-size: 9px; letter-spacing: 0.15em; color: var(--danger); text-transform: uppercase; }
    .btn-yes, .btn-no {
      font-family: inherit; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 10px; cursor: pointer; border: 1px solid;
      background: transparent; transition: background 120ms, color 120ms;
    }
    .btn-yes { color: var(--danger); border-color: var(--danger); }
    .btn-yes:hover { background: var(--danger); color: #fff; }
    .btn-no  { color: var(--txt-muted); border-color: var(--border); }
    .btn-no:hover  { color: var(--txt); border-color: var(--txt-muted); }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 64px 24px;
      border: 1px dashed var(--border);
    }
    .empty-state p { color: var(--txt-sec); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; }
    .empty-state span { display: block; font-size: 9px; color: var(--txt-muted); margin-top: 8px; letter-spacing: 0.1em; }

    /* ── Drawer ── */
    .backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      opacity: 0; pointer-events: none;
      transition: opacity 200ms;
      z-index: 100;
    }
    .backdrop.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 480px; background: var(--bg-card);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 200ms ease-out;
      z-index: 101;
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .drawer-title {
      font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--primary);
    }
    .drawer-subtitle { font-size: 9px; color: var(--txt-muted); margin-top: 4px; letter-spacing: 0.1em; }
    .btn-close {
      background: transparent; border: none; color: var(--txt-muted);
      font-size: 16px; cursor: pointer; padding: 2px 6px; line-height: 1;
      transition: color 120ms;
    }
    .btn-close:hover { color: var(--txt); }

    .drawer-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

    .field-group { display: flex; flex-direction: column; gap: 8px; }
    .field-label {
      font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--txt-muted);
    }
    .field-input, .field-textarea {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      color: var(--txt);
      font-family: inherit; font-size: 12px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 150ms;
      resize: vertical;
    }
    .field-input:focus, .field-textarea:focus { border-color: var(--primary); }
    .field-input.error, .field-textarea.error { border-color: var(--danger); }
    .field-error { font-size: 9px; color: var(--danger); letter-spacing: 0.1em; }

    /* Toggle */
    .toggle-wrap { display: flex; align-items: center; justify-content: space-between; }
    .toggle-label-text { font-size: 11px; color: var(--txt-sec); }
    .toggle {
      position: relative; width: 40px; height: 22px; cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 11px;
      transition: background 200ms;
    }
    .toggle input:checked + .toggle-track { background: var(--success); }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      background: #fff; border-radius: 50%;
      transition: transform 200ms;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

    /* Submit error */
    .submit-error {
      border: 1px solid var(--danger);
      padding: 10px 14px;
      font-size: 10px; color: var(--danger); letter-spacing: 0.1em;
      display: none;
    }
    .submit-error.show { display: block; }

    .drawer-footer {
      padding: 20px 24px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end;
    }
    .btn-cancel {
      background: transparent; border: 1px solid var(--border);
      color: var(--txt-muted); font-family: inherit;
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 9px 20px; cursor: pointer;
      transition: border-color 120ms, color 120ms;
    }
    .btn-cancel:hover { border-color: var(--txt-muted); color: var(--txt); }
    .btn-submit {
      background: transparent; border: 1px solid var(--primary);
      color: var(--primary); font-family: inherit;
      font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase;
      padding: 9px 24px; cursor: pointer;
      transition: background 150ms, color 150ms;
      min-width: 100px;
    }
    .btn-submit:hover:not(:disabled) { background: var(--primary); color: #000; }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Footer */
    .page-footer {
      text-align: center; margin-top: 40px;
      font-size: 9px; color: var(--txt-muted); letter-spacing: 0.2em; text-transform: uppercase;
    }
    .page-footer span { margin: 0 8px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="page-header">
    <div class="brand">RaptorGate</div>
    <div class="divider">
      <div class="divider-line"></div>
      <div class="title">Policy Engine</div>
      <div class="divider-line right"></div>
    </div>
    <div class="subtitle">Zone Management</div>
  </header>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-item module">
      <div class="dot"></div>
      <span>Module: <span class="val">Active</span></span>
    </div>
    <div class="status-item">Total zones: <span class="val" id="stat-total">0</span></div>
    <div class="status-item">Active: <span class="val" id="stat-active">0</span></div>
    <div class="status-item">Inactive: <span class="val" id="stat-inactive">0</span></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-title">Zones</div>
    <button class="btn-new" onclick="openDrawer(null)">+ New Zone</button>
  </div>

  <!-- Table -->
  <div id="table-area"></div>

  <!-- Footer -->
  <footer class="page-footer">
    RaptorGate <span>|</span> Policy Engine <span>|</span> Zone Management
  </footer>

  <!-- Backdrop -->
  <div class="backdrop" id="backdrop" onclick="closeDrawer()"></div>

  <!-- Drawer -->
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div>
        <div class="drawer-title" id="drawer-title">New Zone</div>
        <div class="drawer-subtitle" id="drawer-subtitle">Add a new network zone</div>
      </div>
      <button class="btn-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body">
      <div class="field-group">
        <label class="field-label" for="f-name">Name *</label>
        <input class="field-input" id="f-name" type="text" maxlength="128" placeholder="e.g. DMZ, LAN, WAN" autocomplete="off" />
        <div class="field-error" id="err-name"></div>
      </div>
      <div class="field-group">
        <label class="field-label" for="f-desc">Description *</label>
        <textarea class="field-textarea" id="f-desc" rows="3" placeholder="Describe the purpose of this zone…"></textarea>
        <div class="field-error" id="err-desc"></div>
      </div>
      <div class="field-group">
        <div class="toggle-wrap">
          <span class="toggle-label-text">Zone Active</span>
          <label class="toggle">
            <input type="checkbox" id="f-active" checked />
            <div class="toggle-track"></div>
            <div class="toggle-thumb"></div>
          </label>
        </div>
      </div>
      <div class="submit-error" id="submit-error">Failed to save zone. Please try again.</div>
    </div>
    <div class="drawer-footer">
      <button class="btn-cancel" onclick="closeDrawer()">Cancel</button>
      <button class="btn-submit" id="btn-submit" onclick="submitZone()">Save Zone</button>
    </div>
  </div>

<script>
  // ── Mock data ──
  const zones = [
    {
      id: 'c2bd07b0-ac5e-44a5-a2f0-af19bb72fde4',
      name: 'DMZ',
      description: 'Demilitarized zone for public-facing services and edge infrastructure',
      isActive: true,
      createdAt: '2026-02-14T09:31:00.000Z',
      createdBy: '5ad2d67d-e9d9-4bfe-8708-d0c5b3138d92',
    },
    {
      id: 'a0db06f9-5063-4035-aadd-845248db19e4',
      name: 'LAN',
      description: 'Internal local area network for trusted workstations and printers',
      isActive: true,
      createdAt: '2026-02-14T09:32:10.000Z',
      createdBy: '5ad2d67d-e9d9-4bfe-8708-d0c5b3138d92',
    },
    {
      id: 'f8a1b3c4-1234-4abc-9def-000000000001',
      name: 'MGMT',
      description: 'Management network — restricted to administrators only',
      isActive: false,
      createdAt: '2026-03-01T14:00:00.000Z',
      createdBy: '5ad2d67d-e9d9-4bfe-8708-d0c5b3138d92',
    },
  ];

  let editingId = null;
  let confirmTimers = {};

  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toISOString().split('T')[0];
  }

  function shortId(id) { return id.slice(0, 8) + '…'; }

  function updateStats() {
    document.getElementById('stat-total').textContent    = zones.length;
    document.getElementById('stat-active').textContent   = zones.filter(z => z.isActive).length;
    document.getElementById('stat-inactive').textContent = zones.filter(z => !z.isActive).length;
  }

  function render() {
    updateStats();
    const area = document.getElementById('table-area');

    if (zones.length === 0) {
      area.innerHTML = `
        <div class="empty-state">
          <p>No zones configured</p>
          <span>Click "+ New Zone" to create the first network zone</span>
        </div>`;
      return;
    }

    const rows = zones.map(z => `
      <tr id="row-${z.id}" class="${confirmTimers[z.id] ? 'confirm-delete' : ''}">
        <td>
          <span class="status-dot ${z.isActive ? 'active' : 'inactive'}"
                title="${z.isActive ? 'Active — click to deactivate' : 'Inactive — click to activate'}"
                onclick="toggleActive('${z.id}')"></span>
        </td>
        <td><div class="zone-name">${z.name}</div></td>
        <td><div class="zone-desc" title="${z.description}">${z.description}</div></td>
        <td><span class="mono-id" title="${z.id}">${shortId(z.id)}</span></td>
        <td><span class="created">${fmtDate(z.createdAt)}</span></td>
        <td>
          ${confirmTimers[z.id]
            ? `<div class="confirm-actions">
                 <span class="confirm-label">Delete?</span>
                 <button class="btn-yes" onclick="confirmDelete('${z.id}')">Yes</button>
                 <button class="btn-no"  onclick="cancelDelete('${z.id}')">No</button>
               </div>`
            : `<div class="actions">
                 <button class="btn-icon edit"   onclick="openDrawer('${z.id}')">Edit</button>
                 <button class="btn-icon delete" onclick="startDelete('${z.id}')">Del</button>
               </div>`
          }
        </td>
      </tr>`).join('');

    area.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Status</th>
              <th>Name</th>
              <th>Description</th>
              <th>ID</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }

  function toggleActive(id) {
    const z = zones.find(x => x.id === id);
    if (!z) return;
    z.isActive = !z.isActive;
    render();
  }

  // ── Delete flow ──
  function startDelete(id) {
    confirmTimers[id] = setTimeout(() => cancelDelete(id), 3000);
    render();
  }
  function cancelDelete(id) {
    clearTimeout(confirmTimers[id]);
    delete confirmTimers[id];
    render();
  }
  function confirmDelete(id) {
    clearTimeout(confirmTimers[id]);
    delete confirmTimers[id];
    const row = document.getElementById(`row-${id}`);
    if (row) {
      row.classList.add('row-exit');
      row.addEventListener('animationend', () => {
        const idx = zones.findIndex(z => z.id === id);
        if (idx !== -1) zones.splice(idx, 1);
        render();
      }, { once: true });
    }
  }

  // ── Drawer ──
  function openDrawer(id) {
    editingId = id;
    clearErrors();
    document.getElementById('submit-error').classList.remove('show');

    if (id) {
      const z = zones.find(x => x.id === id);
      document.getElementById('drawer-title').textContent    = 'Edit Zone';
      document.getElementById('drawer-subtitle').textContent = `ID: ${id}`;
      document.getElementById('f-name').value    = z.name;
      document.getElementById('f-desc').value    = z.description;
      document.getElementById('f-active').checked = z.isActive;
    } else {
      document.getElementById('drawer-title').textContent    = 'New Zone';
      document.getElementById('drawer-subtitle').textContent = 'Add a new network zone';
      document.getElementById('f-name').value    = '';
      document.getElementById('f-desc').value    = '';
      document.getElementById('f-active').checked = true;
    }

    document.getElementById('backdrop').classList.add('open');
    document.getElementById('drawer').classList.add('open');
    setTimeout(() => document.getElementById('f-name').focus(), 220);
  }

  function closeDrawer() {
    document.getElementById('backdrop').classList.remove('open');
    document.getElementById('drawer').classList.remove('open');
    editingId = null;
  }

  function clearErrors() {
    ['name','desc'].forEach(f => {
      document.getElementById(`f-${f}`).classList.remove('error');
      document.getElementById(`err-${f}`).textContent = '';
    });
  }

  function validate() {
    let ok = true;
    const name = document.getElementById('f-name').value.trim();
    const desc = document.getElementById('f-desc').value.trim();

    if (!name) {
      document.getElementById('f-name').classList.add('error');
      document.getElementById('err-name').textContent = 'Name is required';
      ok = false;
    }
    if (!desc) {
      document.getElementById('f-desc').classList.add('error');
      document.getElementById('err-desc').textContent = 'Description is required';
      ok = false;
    }
    return ok;
  }

  function submitZone() {
    clearErrors();
    if (!validate()) return;

    const btn = document.getElementById('btn-submit');
    btn.textContent = 'Saving…';
    btn.disabled = true;

    // Simulate async request
    setTimeout(() => {
      btn.textContent = 'Save Zone';
      btn.disabled = false;

      const name     = document.getElementById('f-name').value.trim();
      const desc     = document.getElementById('f-desc').value.trim();
      const isActive = document.getElementById('f-active').checked;

      if (editingId) {
        const z = zones.find(x => x.id === editingId);
        z.name        = name;
        z.description = desc;
        z.isActive    = isActive;
      } else {
        const newZone = {
          id: crypto.randomUUID(),
          name, description: desc, isActive,
          createdAt: new Date().toISOString(),
          createdBy: 'current-user',
        };
        zones.unshift(newZone);
      }
      closeDrawer();
      render();
    }, 700);
  }

  // Keyboard: Escape closes drawer
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDrawer();
  });

  // Clear error on input
  document.getElementById('f-name').addEventListener('input', () => {
    document.getElementById('f-name').classList.remove('error');
    document.getElementById('err-name').textContent = '';
  });
  document.getElementById('f-desc').addEventListener('input', () => {
    document.getElementById('f-desc').classList.remove('error');
    document.getElementById('err-desc').textContent = '';
  });

  render();
</script>
</body>
</html>
