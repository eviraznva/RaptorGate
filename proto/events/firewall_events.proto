syntax = "proto3";

package raptorgate.events;

import "google/protobuf/timestamp.proto";

message Event {
  google.protobuf.Timestamp emitted_at = 1;
  EventKind kind = 2;
}

message EventKind {
  oneof item {
    TcpSessionEstablishedEvent     tcp_session_established  = 1;
    TcpSessionRemovedEvent         tcp_session_removed      = 2;
    TcpConnectionRejectedEvent     tcp_connection_rejected  = 3;
    TcpSessionAbortedMidCloseEvent tcp_session_aborted      = 4;
    TlsInterceptStartedEvent      tls_intercept_started     = 5;
    TlsHandshakeCompleteEvent      tls_handshake_complete    = 6;
    TlsSessionClosedEvent         tls_session_closed        = 7;
    InboundTlsInterceptStartedEvent   inbound_tls_intercept_started   = 8;
    InboundTlsHandshakeCompleteEvent  inbound_tls_handshake_complete  = 9;
    InboundTlsSessionClosedEvent      inbound_tls_session_closed      = 10;
    DecryptedTrafficClassifiedEvent   decrypted_traffic_classified    = 11;
    DecryptedIpsMatchEvent            decrypted_ips_match             = 12;
    TlsUntrustedCertDetectedEvent     tls_untrusted_cert_detected     = 13;
    TlsBypassAppliedEvent             tls_bypass_applied              = 14;
    InboundTlsBypassAppliedEvent      inbound_tls_bypass_applied      = 15;
    PinningFailureDetectedEvent       pinning_failure_detected        = 16;
    PinningAutoBypassActivatedEvent   pinning_auto_bypass_activated   = 17;
    TlsHandshakeFailedEvent           tls_handshake_failed            = 18;
    EchAttemptDetectedEvent           ech_attempt_detected            = 19;
  }
}

message TcpEndpoint {
  string ip   = 1;
  uint32 port = 2;
}

message TcpSessionEstablishedEvent {
  TcpEndpoint src = 1;
  TcpEndpoint dst = 2;
}

message TcpSessionRemovedEvent {
  TcpEndpoint src = 1;
  TcpEndpoint dst = 2;
}

message TcpConnectionRejectedEvent {
  TcpEndpoint src = 1;
  TcpEndpoint dst = 2;
}

message TcpSessionAbortedMidCloseEvent {
  TcpEndpoint src = 1;
  TcpEndpoint dst = 2;
}

message TlsInterceptStartedEvent {
  string peer_ip     = 1;
  uint32 peer_port   = 2;
  string dst_ip      = 3;
  uint32 dst_port    = 4;
  string sni         = 5;
  string tls_version = 6;
}

message TlsHandshakeCompleteEvent {
  string peer_ip     = 1;
  uint32 peer_port   = 2;
  string dst_ip      = 3;
  uint32 dst_port    = 4;
  string sni         = 5;
  string alpn        = 6;
  string tls_version = 7;
}

message TlsSessionClosedEvent {
  string peer_ip   = 1;
  uint32 peer_port = 2;
  string dst_ip    = 3;
  uint32 dst_port  = 4;
  string sni       = 5;
  uint64 bytes_up  = 6;
  uint64 bytes_down = 7;
}

message InboundTlsInterceptStartedEvent {
  string peer_ip       = 1;
  uint32 peer_port     = 2;
  string server_ip     = 3;
  uint32 server_port   = 4;
  string sni           = 5;
  string common_name   = 6;
  string tls_version   = 7;
}

message InboundTlsHandshakeCompleteEvent {
  string peer_ip       = 1;
  uint32 peer_port     = 2;
  string server_ip     = 3;
  uint32 server_port   = 4;
  string sni           = 5;
  string alpn          = 6;
  string tls_version   = 7;
}

message InboundTlsSessionClosedEvent {
  string peer_ip       = 1;
  uint32 peer_port     = 2;
  string server_ip     = 3;
  uint32 server_port   = 4;
  string sni           = 5;
  uint64 bytes_up      = 6;
  uint64 bytes_down    = 7;
}

message DecryptedTrafficClassifiedEvent {
  string peer_ip       = 1;
  uint32 peer_port     = 2;
  string server_ip     = 3;
  uint32 server_port   = 4;
  string sni           = 5;
  string app_proto     = 6;
  string direction     = 7;
  string mode          = 8;
}

message DecryptedIpsMatchEvent {
  string peer_ip         = 1;
  uint32 peer_port       = 2;
  string server_ip       = 3;
  uint32 server_port     = 4;
  string sni             = 5;
  string signature_name  = 6;
  string severity        = 7;
  bool   blocked         = 8;
  string direction       = 9;
  string mode            = 10;
  string log_id          = 11;
}

message TlsUntrustedCertDetectedEvent {
  string peer_ip     = 1;
  uint32 peer_port   = 2;
  string dst_ip      = 3;
  uint32 dst_port    = 4;
  string sni         = 5;
  string domain      = 6;
  string tls_version = 7;
}

message TlsBypassAppliedEvent {
  string peer_ip     = 1;
  uint32 peer_port   = 2;
  string dst_ip      = 3;
  uint32 dst_port    = 4;
  string sni         = 5;
  string domain      = 6;
  string tls_version = 7;
}

message InboundTlsBypassAppliedEvent {
  string peer_ip       = 1;
  uint32 peer_port     = 2;
  string server_ip     = 3;
  uint32 server_port   = 4;
  string sni           = 5;
  string tls_version   = 6;
}

message PinningFailureDetectedEvent {
  string peer_ip     = 1;
  uint32 peer_port   = 2;
  string dst_ip      = 3;
  uint32 dst_port    = 4;
  string sni         = 5;
  string tls_version = 6;
}

message PinningAutoBypassActivatedEvent {
  string source_ip  = 1;
  string domain     = 2;
  string reason     = 3;
}

message TlsHandshakeFailedEvent {
  string peer_ip     = 1;
  uint32 peer_port   = 2;
  string dst_ip      = 3;
  uint32 dst_port    = 4;
  string sni         = 5;
  string tls_version = 6;
  string stage       = 7;
  string reason      = 8;
  string mode        = 9;
}

message EchAttemptDetectedEvent {
  string source_ip = 1;
  string domain    = 2;
  string origin    = 3;
  string action    = 4;
}
