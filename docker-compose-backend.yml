services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-raptorgate}
      POSTGRES_USER: ${DB_USER:-raptorgate}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-raptorgate}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-raptorgate} -d ${DB_NAME:-raptorgate}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.1-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
