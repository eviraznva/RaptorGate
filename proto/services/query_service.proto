syntax = "proto3";

package raptorgate.services;

// Hosted by the firewall. The backend dials in with unary RPCs.
service FirewallQueryService {
  rpc GetTcpSessions  (GetTcpSessionsRequest)  returns (GetTcpSessionsResponse);
  rpc ValidateConfig  (ValidateRaptorlangRequest)  returns (ValidateRaptorlangResponse);
  rpc GetNatBindings  (GetNatBindingsRequest)  returns (GetNatBindingsResponse);
}

message GetTcpSessionsRequest {}
message GetTcpSessionsResponse {}

message ValidateRaptorlangRequest {
  string raptorlang = 1;
}

message ValidateRaptorlangResponse {
  optional string error = 1;
}

message GetNatBindingsRequest {}
message GetNatBindingsResponse {}
