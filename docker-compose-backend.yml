services:
  redis:
    image: redis:8.6.1-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
